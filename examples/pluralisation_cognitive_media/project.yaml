  core_claim: >-
    Une personne peut pluraliser ses capacités cognitives et opératoires sans
    dissoudre son unité personnelle ni sa responsabilité, si les agents restent
    rattachés à un Corpus, à des mandats explicites, à des frontières de confiance
    et à un ancrage humain.

