public_article_url: null

script:
  path: "spoken_script.md"
  form: "spoken_essay_script"
  status: "draft"
  max_utterance_characters: 350
  min_utterance_characters: 30
  default_pause_ms: 350
  chapter_pause_ms: 900
  pronunciation_map:
    "JHN": "ji ache enne"
    "Cogentia": "Co-gèn-tia"
    "FractaNet": "Fracta Net"
    "Substack": "Sub-stack"
  allowed_directives:
    - "pause"
    - "chapter"
    - "quote-card"
    - "pronounce"
    - "exclude-from-speech"

tts:
  # `mock` must work without network access and is the default for tests.
  # Change to `command` only after configuring a real executable locally.
  provider: "mock"
  voice: "fr-FR-generic"
  language: "fr-FR"
  rate: 1.0
  pitch: 0.0
  text_left_local_machine: false
  command: null
  mock:
    mode: "tone"
    milliseconds_per_character: 35
    minimum_duration_ms: 600

audio:
  sample_rate_hz: 48000
  channels: 1
  loudness_lufs: -16
  true_peak_db: -1.5
  loudness_range_lu: 11
  podcast_mp3_kbps: 128
  intro_silence_ms: 300
  outro_silence_ms: 800

captions:
  enabled: true
  max_lines: 2
  target_characters_per_line: 42
  hard_max_characters_per_line: 52
  minimum_cue_ms: 800
  burn_into_video: true
  sidecar_srt: true
  sidecar_vtt: true

visuals:
  theme:
    background: "#111111"
    foreground: "#F5F5F5"
    muted: "#B0B0B0"
    accent: "#D7A84B"
    font_family: "DejaVu Sans"
    title_font_path: null
    body_font_path: null
    safe_margin_px: 120
    footer_height_px: 90
    show_source_footer: true
  scene_policy:
    cover_minimum_ms: 4000
    chapter_minimum_ms: 3000
    closing_ms: 6000
    body_max_characters: 240
    quote_max_characters: 320
  approved_assets: []

video_profiles:
  landscape_1080p:
    width: 1920
    height: 1080
    fps: 25
    video_codec: "libx264"
    pixel_format: "yuv420p"
    crf: 20
    preset: "medium"
    audio_codec: "aac"
    audio_bitrate: "192k"
    captions: "burned_and_sidecar"
    movflags_faststart: true

packages:
  - "podcast"
  - "youtube"
  - "facebook_video"
  - "linkedin_video"

